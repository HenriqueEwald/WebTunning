<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout de Pagamento</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: url("foto capa.png") no-repeat center center;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .checkout {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            padding: 25px;
            border-radius: 15px;
            width: 320px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        }

        h1 {
            color: #2563eb;
            font-size: 20px;
            margin-bottom: 10px;
        }

        p {
            margin: 8px 0 5px;
            font-size: 14px;
        }

        input,
        select {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-bottom: 10px;
        }

        input:focus,
        select:focus {
            border: 1px solid #2563eb;
            box-shadow: 0 0 5px rgba(37, 99, 235, 0.5);
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #2563eb;
            color: white;
            font-size: 15px;
            cursor: pointer;
        }

        .checkout::before {
            content: "";
            display: block;
            height: 5px;
            background: #2563eb;
            border-radius: 10px 10px 0 0;
            margin: -25px -25px 20px -25px;
        }

        button:hover {
            background: #1d4ed8;
        }

        .voltar {
            position: absolute;
            top: 20px;
            left: 20px;
        }

        .voltar button {
            width: auto;
            padding: 8px 12px;
            background: #6b7280;
        }
    </style>
</head>

<body>

    <div class="voltar">
        <a href="index.html">
            <button>Voltar</button>
        </a>
    </div>


    <div class="checkout">
        <form class="form-pagamento">

            <h1>Checkout</h1>
            <p>Preencha os dados:</p>

            <p>Nome Completo</p>
            <input type="text" placeholder="Seu nome completo" required>

            <p>CPF</p>
            <input type="text" pattern="[0-9]{11}" placeholder="12345678901" required>

            <p>Modelo</p>
            <select required>
                <option value="">Selecione</option>
                <option>Triciclo 50cc</option>
                <option>Mini B</option>
                <option>Kombixinha</option>
            </select>

            <p>Pagamento</p>
            <select required>
                <option value="">Selecione</option>
                <option>Cartão de Crédito</option>
                <option>Boleto</option>
                <option>PIX</option>
            </select>

            <button type="submit">Finalizar Compra</button>

        </form>
    </div>

</body>

</html>
